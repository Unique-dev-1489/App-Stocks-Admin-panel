<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Stocks - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f0c29;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --accent-gradient: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-color) url('https://www.transparenttextures.com/patterns/cubes.png'); 
            color: var(--text-color); 
            line-height: 1.6; 
            min-height: 100vh;
        }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        .glass-panel { 
            background: var(--glass-bg); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 15px; 
            padding: 25px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); 
            margin-bottom: 20px; 
        }
        .btn { 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border: none; 
            color: white; 
        }
        .btn-primary { 
            background: var(--accent-gradient); 
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4); 
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.6); 
        }
        .btn-sm { 
            padding: 5px 10px; 
            font-size: 0.8rem; 
        }
        .btn-success { background: var(--success-color); }
        .btn-danger { background: var(--danger-color); }
        .btn-warning { background: var(--warning-color); color: #333; }
        
        h1, h2, h3 { 
            background: var(--accent-gradient); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            margin-bottom: 1rem; 
        }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--glass-border); 
            border-radius: 8px; 
            color: var(--text-color); 
            font-family: 'Poppins', sans-serif; 
            margin-bottom: 15px; 
        }
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: var(--neon-cyan); 
            box-shadow: 0 0 10px var(--neon-cyan); 
        }
        
        .hidden { display: none !important; }
        .login-container { max-width: 400px; margin: 100px auto; }
        
        .dashboard-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .admin-sections { 
            display: grid; 
            grid-template-columns: 1fr 1.5fr; 
            gap: 30px; 
            align-items: start;
        }
        
        .left-column {
            position: sticky;
            top: 20px;
        }
        
        .right-column {
            min-height: 100vh;
        }
        
        .section-title { 
            border-bottom: 2px solid; 
            border-image: var(--accent-gradient) 1; 
            padding-bottom: 10px; 
        }
        
        .list-item {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item .info { flex-grow: 1; min-width: 200px; }
        .list-item .info strong { color: #fff; }
        .list-item .info small { font-size: 0.75rem; }
        .list-item .actions { 
            display: flex; 
            gap: 8px; 
            flex-wrap: wrap; 
            align-items: center;
        }
        
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        
        @media (max-width: 968px) {
            .admin-sections {
                grid-template-columns: 1fr;
            }
            .left-column {
                position: static;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .toggle-switch { 
            position: relative; 
            display: inline-block; 
            width: 50px; 
            height: 26px; 
        }
        .toggle-switch input { 
            opacity: 0; 
            width: 0; 
            height: 0; 
        }
        .slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-color: #333; 
            transition: .4s; 
            border-radius: 34px; 
        }
        .slider:before { 
            position: absolute; 
            content: ""; 
            height: 18px; 
            width: 18px; 
            left: 4px; 
            bottom: 4px; 
            background-color: white; 
            transition: .4s; 
            border-radius: 50%; 
        }
        input:checked + .slider { background: var(--neon-magenta); }
        input:checked + .slider:before { transform: translateX(24px); }
        
        .stats-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 4px;
        }
        .stats-downloads { background: var(--success-color); color: white; }
        .stats-size { background: var(--neon-cyan); color: #333; }
        .stats-version { background: var(--warning-color); color: #333; }
        
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        .status-update { background: #17a2b8; color: white; }

        .developer-email-input { flex: 1; }
        .developer-list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px; 
            border-bottom: 1px solid var(--glass-border); 
        }
        
        .notification-status {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            text-align: center;
            font-weight: 600;
        }
        .notification-success { background: var(--success-color); color: white; display: block; }
        .notification-error { background: var(--danger-color); color: white; display: block; }
        
        .categories-section { margin-top: 20px; }
        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- Login View -->
    <div id="login-view" class="container login-container">
        <div class="glass-panel">
            <h1>🔐 Admin Login</h1>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
                <p id="login-error" style="color: var(--danger-color); margin-top: 15px;"></p>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="container hidden">
        <header class="dashboard-header">
            <h1>📊 Admin Dashboard</h1>
            <div>
                <span id="admin-email" style="margin-right: 20px;"></span>
                <button id="logout-btn" class="btn btn-primary">Logout</button>
            </div>
        </header>

        <main class="admin-sections">
            <!-- Left Column: Forms -->
            <div class="left-column">
                <!-- Add/Edit Item Form -->
                <div id="item-form-container" class="glass-panel">
                    <h2 id="form-title" class="section-title">➕ Add New Item</h2>
                    <form id="item-form">
                        <input type="hidden" id="item-id">
                        <input type="hidden" id="pending-id">
                        <input type="hidden" id="submitter-email">
                        <input type="hidden" id="update-of-id">

                        <div class="form-grid">
                            <input type="text" id="item-title" placeholder="Title" required>
                            <input type="url" id="item-logoUrl" placeholder="Logo URL" required>
                        </div>
                        <textarea id="item-description" placeholder="Description" rows="4" required></textarea>
                        <input type="text" id="item-publisherName" placeholder="Publisher Name" required>
                        <input type="text" id="item-publisherEmail" placeholder="Publisher Email" required>
                        <input type="text" id="item-screenshots" placeholder="Screenshots (comma-separated URLs)">
                        
                        <div class="form-grid">
                            <select id="item-type" required>
                                <option value="App">App</option>
                                <option value="Game">Game</option>
                            </select>
                            <select id="item-submissionType" required>
                                <option value="embed">HTML Embed</option>
                                <option value="link">External Link</option>
                            </select>
                        </div>
                        
                        <div class="form-grid">
                            <input type="text" id="item-version" placeholder="Version (e.g., 1.0.0)" required>
                            <div style="display: flex; gap: 10px;">
                                <input type="number" id="item-sizeMB" placeholder="Size" step="0.1" required style="flex:2;">
                                <select id="item-sizeUnit" style="flex:1;">
                                    <option value="KB">KB</option>
                                    <option value="MB" selected>MB</option>
                                    <option value="GB">GB</option>
                                </select>
                            </div>
                        </div>
                        
                        <textarea id="item-embedCode" placeholder="HTML Embed Code" rows="4" class="hidden"></textarea>
                        <input type="url" id="item-downloadLink" placeholder="Download Link" class="hidden">
                        
                        <div class="form-grid">
                            <button type="submit" class="btn btn-primary">💾 Save Item</button>
                            <button type="button" id="clear-form-btn" class="btn" style="background: #555;">🗑 Clear Form</button>
                        </div>
                    </form>
                </div>

                <!-- Send Announcement -->
                <div class="glass-panel">
                    <h2 class="section-title">📢 Send Announcement</h2>
                    <form id="announcement-form">
                        <input type="text" id="announce-title" placeholder="Notification Title" required>
                        <textarea id="announce-message" placeholder="Message (optional)" rows="3"></textarea>
                        <button type="submit" class="btn btn-primary">🚀 Send to All Users</button>
                    </form>
                    <div id="notification-status" class="notification-status"></div>
                    <div style="margin-top: 15px; text-align: center;">
                        <small style="color: var(--text-muted);">
                            📊 Total notifications sent: <strong id="total-notifications" style="color: var(--neon-cyan);">0</strong>
                        </small>
                    </div>
                </div>
            </div>

            <!-- Right Column: Lists & Management -->
            <div class="right-column">
                <!-- Pending Submissions -->
                <div class="glass-panel">
                    <h2 class="section-title">⏳ Pending Submissions</h2>
                    <div id="pending-submissions-list"></div>
                </div>

                <!-- Published Items -->
                <div class="glass-panel">
                    <h2 class="section-title">📦 Published Items</h2>
                    <div id="published-items-list"></div>
                </div>

                <!-- Developer Management -->
                <div class="glass-panel">
                    <h2 class="section-title">🛠 Developer Access</h2>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <input type="email" id="dev-email-input" placeholder="User email" class="developer-email-input">
                        <button id="grant-dev-btn" class="btn btn-success btn-sm">Grant</button>
                        <button id="revoke-dev-btn" class="btn btn-danger btn-sm">Revoke</button>
                    </div>
                    <h3 style="color: var(--neon-cyan);">Current Developers</h3>
                    <div id="developers-list" style="max-height:300px; overflow-y:auto;">
                        <p>No developers yet.</p>
                    </div>
                </div>

                <!-- Categories Management -->
                <div class="glass-panel categories-section">
                    <h2 class="section-title">📁 Manage Categories</h2>
                    <form id="add-category-form" style="display: flex; gap: 10px;">
                        <input type="text" id="new-category-name" placeholder="New category name" required style="flex: 1;">
                        <button type="submit" class="btn btn-success btn-sm" style="white-space: nowrap;">➕ Add</button>
                    </form>
                    <div id="categories-list" style="margin-top: 15px; max-height: 200px; overflow-y: auto;">
                        <p>Loading categories...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCyeCIbVLKxlG8ZnD7Pgd0396IMpAPGpqE",
        authDomain: "app-store-stocks.firebaseapp.com",
        databaseURL: "https://app-store-stocks-default-rtdb.firebaseio.com",
        projectId: "app-store-stocks",
        storageBucket: "app-store-stocks.firebasestorage.app",
        messagingSenderId: "1066420357396",
        appId: "1:1066420357396:web:99348a13f243bfb5601a01"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    const firestore = firebase.firestore();

    // DOM Elements
    const DOM = {
        loginView: document.getElementById('login-view'),
        dashboardView: document.getElementById('dashboard-view'),
        loginForm: document.getElementById('login-form'),
        loginError: document.getElementById('login-error'),
        adminEmail: document.getElementById('admin-email'),
        logoutBtn: document.getElementById('logout-btn'),
        itemForm: document.getElementById('item-form'),
        formTitle: document.getElementById('form-title'),
        clearFormBtn: document.getElementById('clear-form-btn'),
        pendingList: document.getElementById('pending-submissions-list'),
        publishedList: document.getElementById('published-items-list'),
        submissionTypeSelect: document.getElementById('item-submissionType'),
        embedCodeInput: document.getElementById('item-embedCode'),
        downloadLinkInput: document.getElementById('item-downloadLink'),
        devEmailInput: document.getElementById('dev-email-input'),
        grantDevBtn: document.getElementById('grant-dev-btn'),
        revokeDevBtn: document.getElementById('revoke-dev-btn'),
        developersList: document.getElementById('developers-list'),
        announcementForm: document.getElementById('announcement-form'),
        notificationStatus: document.getElementById('notification-status'),
        totalNotifications: document.getElementById('total-notifications'),
        addCategoryForm: document.getElementById('add-category-form'),
        newCategoryName: document.getElementById('new-category-name'),
        categoriesList: document.getElementById('categories-list')
    };
    
    const sanitizeEmail = (email) => email.toLowerCase().replace(/[.#$[\]]/g, "_");
    
    const formatFileSize = (sizeMB, unit) => {
        if (!sizeMB) return 'N/A';
        if (unit === 'GB') return `${sizeMB} GB`;
        if (unit === 'KB') return `${sizeMB} KB`;
        return `${sizeMB} MB`;
    };

    const showNotificationStatus = (message, isSuccess) => {
        DOM.notificationStatus.textContent = message;
        DOM.notificationStatus.className = 'notification-status';
        DOM.notificationStatus.classList.add(isSuccess ? 'notification-success' : 'notification-error');
        setTimeout(() => {
            DOM.notificationStatus.className = 'notification-status';
            DOM.notificationStatus.textContent = '';
        }, 3000);
    };

    // Authentication
    auth.onAuthStateChanged(user => {
        if (user) {
            DOM.loginView.classList.add('hidden');
            DOM.dashboardView.classList.remove('hidden');
            DOM.adminEmail.textContent = user.email;
            initDashboard();
        } else {
            DOM.loginView.classList.remove('hidden');
            DOM.dashboardView.classList.add('hidden');
        }
    });

    DOM.loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        auth.signInWithEmailAndPassword(email, password)
            .catch(error => DOM.loginError.textContent = error.message);
    });

    DOM.logoutBtn.addEventListener('click', () => auth.signOut());

    function initDashboard() {
        loadPendingSubmissions();
        loadPublishedItems();
        setupSubmissionTypeToggle();
        loadDevelopers();
        setupAnnouncementForm();
        loadCategories();
        setupCategoryForm();
        loadNotificationCount();
    }
    
    // ANNOUNCEMENT/NOTIFICATION SYSTEM
    function setupAnnouncementForm() {
        DOM.announcementForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('announce-title').value.trim();
            const message = document.getElementById('announce-message').value.trim();
            
            if (!title) {
                showNotificationStatus('Please enter a title', false);
                return;
            }
            
            firestore.collection('notifications').add({
                title: title,
                message: message || '',
                timestamp: new Date().toISOString()
            })
            .then(() => {
                showNotificationStatus('✅ Notification sent successfully!', true);
                DOM.announcementForm.reset();
                loadNotificationCount();
            })
            .catch(error => {
                showNotificationStatus('❌ Error: ' + error.message, false);
                console.error('Notification error:', error);
            });
        });
    }
    
    function loadNotificationCount() {
        firestore.collection('notifications').onSnapshot(snap => {
            if (DOM.totalNotifications) {
                DOM.totalNotifications.textContent = snap.size;
            }
        });
    }
    
    // CATEGORIES MANAGEMENT
    function loadCategories() {
        firestore.collection('categories').orderBy('name').onSnapshot(snapshot => {
            DOM.categoriesList.innerHTML = '';
            
            if (snapshot.empty) {
                DOM.categoriesList.innerHTML = '<p style="color: var(--text-muted);">No categories yet. Add one above!</p>';
                return;
            }
            
            snapshot.forEach(doc => {
                const category = doc.data();
                const categoryId = doc.id;
                
                const div = document.createElement('div');
                div.className = 'category-item';
                div.innerHTML = `
                    <span>${category.name}</span>
                    <button class="btn btn-danger btn-sm" data-category-id="${categoryId}">🗑</button>
                `;
                
                DOM.categoriesList.appendChild(div);
            });
        });
    }
    
    function setupCategoryForm() {
        DOM.addCategoryForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = DOM.newCategoryName.value.trim();
            
            if (!name) return;
            
            firestore.collection('categories').add({ name: name })
                .then(() => {
                    DOM.newCategoryName.value = '';
                    showNotificationStatus('✅ Category added!', true);
                })
                .catch(error => {
                    showNotificationStatus('❌ Error: ' + error.message, false);
                });
        });
        
        DOM.categoriesList.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const categoryId = e.target.dataset.categoryId;
                if (confirm('Delete this category?')) {
                    firestore.collection('categories').doc(categoryId).delete()
                        .then(() => showNotificationStatus('✅ Category deleted!', true))
                        .catch(error => showNotificationStatus('❌ Error: ' + error.message, false));
                }
            }
        });
    }
    
    function setupSubmissionTypeToggle() {
        DOM.submissionTypeSelect.addEventListener('change', (e) => {
            const isEmbed = e.target.value === 'embed';
            DOM.embedCodeInput.classList.toggle('hidden', !isEmbed);
            DOM.downloadLinkInput.classList.toggle('hidden', isEmbed);
        });
    }
    
    // Load pending submissions
    function loadPendingSubmissions() {
        database.ref('pendingSubmissions').on('value', snapshot => {
            DOM.pendingList.innerHTML = '';
            if (!snapshot.exists()) {
                DOM.pendingList.innerHTML = '<p style="padding: 15px;">✨ No pending submissions.</p>';
                return;
            }
            snapshot.forEach(child => {
                const id = child.key;
                const sub = child.val();
                const isUpdate = !!sub.updateOf;
                const sizeText = sub.sizeMB ? formatFileSize(sub.sizeMB, sub.sizeUnit || 'MB') : 'Size N/A';
                const itemDiv = document.createElement('div');
                itemDiv.className = 'list-item';
                itemDiv.innerHTML = `
                    <div class="info">
                        <strong>${sub.title}</strong><br>
                        <small>
                            by ${sub.submitterName} (${sub.type}) 
                            ${isUpdate ? '<span class="status-badge status-update">🔄 Update Request</span>' : ''}
                        </small><br>
                        <small>📦 ${sizeText} | 📌 v${sub.version || '1.0.0'}</small>
                    </div>
                    <div class="actions">
                        <button class="btn btn-sm btn-success approve-btn" data-id="${id}">✓ Approve</button>
                        <button class="btn btn-sm btn-danger reject-btn" data-id="${id}">✗ Reject</button>
                    </div>
                `;
                DOM.pendingList.appendChild(itemDiv);
            });
        });
    }

    function loadPublishedItems() {
        database.ref('items').orderByChild('publishedAt').on('value', snapshot => {
            DOM.publishedList.innerHTML = '';
            let items = [];
            snapshot.forEach(child => {
                items.push({ id: child.key, ...child.val() });
            });
            items.reverse().forEach(item => {
                const downloads = item.downloads || 0;
                const sizeText = item.sizeMB ? formatFileSize(item.sizeMB, item.sizeUnit || 'MB') : 'Size N/A';
                const itemDiv = document.createElement('div');
                itemDiv.className = 'list-item';
                itemDiv.innerHTML = `
                    <div class="info">
                        <strong>${item.title}</strong><br>
                        <small>by ${item.publisherName} (${item.type})</small><br>
                        <small>
                            <span class="stats-badge stats-downloads">📥 ${downloads}</span>
                            <span class="stats-badge stats-size">💾 ${sizeText}</span>
                            <span class="stats-badge stats-version">📌 v${item.version || '1.0.0'}</span>
                        </small>
                    </div>
                    <div class="actions">
                        <label class="toggle-switch" title="Featured">
                          <input type="checkbox" class="featured-toggle" data-id="${item.id}" ${item.isFeatured ? 'checked' : ''}>
                          <span class="slider"></span>
                        </label>
                        <button class="btn btn-sm edit-btn" data-id="${item.id}">✏️ Edit</button>
                        <button class="btn btn-sm btn-danger delete-btn" data-id="${item.id}">🗑 Delete</button>
                    </div>
                `;
                DOM.publishedList.appendChild(itemDiv);
            });
        });
    }
    
    // Developer management
    function loadDevelopers() {
        database.ref('developerAccess').on('value', snapshot => {
            DOM.developersList.innerHTML = '';
            if (!snapshot.exists()) {
                DOM.developersList.innerHTML = '<p>No developers yet.</p>';
                return;
            }
            snapshot.forEach(child => {
                const emailKey = child.key;
                const isDev = child.val();
                if (!isDev) return;
                const devDiv = document.createElement('div');
                devDiv.className = 'developer-list-item';
                devDiv.innerHTML = `
                    <span>${emailKey}</span>
                    <button class="btn btn-sm btn-danger remove-dev-btn" data-email="${emailKey}">Remove</button>
                `;
                DOM.developersList.appendChild(devDiv);
            });
        });
    }

    DOM.grantDevBtn.addEventListener('click', () => {
        const email = DOM.devEmailInput.value.trim();
        if (!email) return alert('Enter an email');
        const sanitized = sanitizeEmail(email);
        database.ref('developerAccess/' + sanitized).set(true).then(() => {
            database.ref('notifications/' + sanitized).push({
                title: 'Developer Access Granted',
                status: 'approved',
                message: 'You have been granted developer status! You can now access the Developer Dashboard.',
                seen: false,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            alert('Developer access granted!');
            DOM.devEmailInput.value = '';
        });
    });

    DOM.revokeDevBtn.addEventListener('click', () => {
        const email = DOM.devEmailInput.value.trim();
        if (!email) return alert('Enter an email');
        const sanitized = sanitizeEmail(email);
        database.ref('developerAccess/' + sanitized).remove().then(() => {
            database.ref('notifications/' + sanitized).push({
                title: 'Developer Access Revoked',
                status: 'rejected',
                message: 'Your developer status has been revoked.',
                seen: false,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            alert('Developer access revoked.');
            DOM.devEmailInput.value = '';
        });
    });

    DOM.developersList.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-dev-btn')) {
            const email = e.target.dataset.email;
            if (confirm('Remove developer status for ' + email + '?')) {
                database.ref('developerAccess/' + email).remove();
            }
        }
    });
    
    function clearForm() {
        DOM.itemForm.reset();
        DOM.formTitle.textContent = "➕ Add New Item";
        document.getElementById('item-id').value = '';
        document.getElementById('pending-id').value = '';
        document.getElementById('submitter-email').value = '';
        document.getElementById('update-of-id').value = '';
        DOM.embedCodeInput.classList.add('hidden');
        DOM.downloadLinkInput.classList.add('hidden');
    }
    
    DOM.clearFormBtn.addEventListener('click', clearForm);
    
    DOM.itemForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const sizeMB = parseFloat(document.getElementById('item-sizeMB').value);
        if (isNaN(sizeMB) || sizeMB <= 0) {
            alert('Please enter a valid file size');
            return;
        }
        const formData = {
            title: document.getElementById('item-title').value,
            description: document.getElementById('item-description').value,
            logoUrl: document.getElementById('item-logoUrl').value,
            publisherName: document.getElementById('item-publisherName').value,
            publisherEmail: document.getElementById('item-publisherEmail').value,
            screenshots: document.getElementById('item-screenshots').value.split(',').map(s => s.trim()).filter(s => s),
            type: document.getElementById('item-type').value,
            submissionType: document.getElementById('item-submissionType').value,
            version: document.getElementById('item-version').value,
            sizeMB: sizeMB,
            sizeUnit: document.getElementById('item-sizeUnit').value,
            embedCode: document.getElementById('item-embedCode').value,
            downloadLink: document.getElementById('item-downloadLink').value,
            updatedAt: firebase.database.ServerValue.TIMESTAMP
        };
        const itemId = document.getElementById('item-id').value;
        const pendingId = document.getElementById('pending-id').value;
        const submitterEmail = document.getElementById('submitter-email').value;
        const updateOfId = document.getElementById('update-of-id').value;

        if (itemId) {
            database.ref(`items/${itemId}`).update(formData).then(() => {
                alert('✅ Item updated successfully!');
                clearForm();
            });
        } else {
            if (updateOfId) {
                database.ref(`items/${updateOfId}`).update(formData)
                    .then(() => {
                        database.ref(`pendingSubmissions/${pendingId}`).remove();
                        sendNotification(submitterEmail, formData.title, 'approved', `Your update request for "${formData.title}" was approved!`);
                        alert('✅ Update approved and published!');
                        clearForm();
                    });
            } else {
                formData.publishedAt = firebase.database.ServerValue.TIMESTAMP;
                formData.avgRating = 0;
                formData.totalRatings = 0;
                formData.sumOfRatings = 0;
                formData.downloads = 0;
                formData.isFeatured = false;

                database.ref('items').push(formData).then(() => {
                    if (pendingId) {
                        database.ref(`pendingSubmissions/${pendingId}`).remove();
                        sendNotification(submitterEmail, formData.title, 'approved', `Your submission "${formData.title}" has been approved and published!`);
                    }
                    alert('✅ Item published successfully!');
                    clearForm();
                });
            }
        }
    });

    document.body.addEventListener('click', async (e) => {
        const target = e.target;
        if (target.classList.contains('approve-btn')) {
            const id = target.dataset.id;
            const snapshot = await database.ref(`pendingSubmissions/${id}`).once('value');
            const sub = snapshot.val();
            clearForm();
            DOM.formTitle.textContent = sub.updateOf ? "🔄 Approve Update Request" : "✓ Approve Submission";
            document.getElementById('pending-id').value = id;
            document.getElementById('submitter-email').value = sub.submitterEmail;
            document.getElementById('item-title').value = sub.title;
            document.getElementById('item-description').value = sub.description;
            document.getElementById('item-logoUrl').value = sub.logoUrl;
            document.getElementById('item-publisherName').value = sub.submitterName;
            document.getElementById('item-publisherEmail').value = sub.submitterEmail;
            document.getElementById('item-screenshots').value = (sub.screenshots || []).join(', ');
            document.getElementById('item-type').value = sub.type;
            document.getElementById('item-submissionType').value = sub.submissionType;
            document.getElementById('item-version').value = sub.version || '1.0.0';
            document.getElementById('item-sizeMB').value = sub.sizeMB || '';
            document.getElementById('item-sizeUnit').value = sub.sizeUnit || 'MB';
            document.getElementById('item-embedCode').value = sub.embedCode || '';
            document.getElementById('item-downloadLink').value = sub.downloadLink || '';
            if (sub.updateOf) {
                document.getElementById('update-of-id').value = sub.updateOf;
            }
            DOM.submissionTypeSelect.dispatchEvent(new Event('change'));
            // Scroll to form instead of top
            document.getElementById('item-form-container').scrollIntoView({ behavior: 'smooth' });
        }
        if (target.classList.contains('reject-btn')) {
            const id = target.dataset.id;
            if (confirm('Are you sure you want to reject this submission?')) {
                const snapshot = await database.ref(`pendingSubmissions/${id}`).once('value');
                const sub = snapshot.val();
                database.ref(`pendingSubmissions/${id}`).remove().then(() => {
                    sendNotification(sub.submitterEmail, sub.title, 'rejected', `Your submission "${sub.title}" was rejected. Please check the requirements and resubmit.`);
                    alert('❌ Submission rejected.');
                });
            }
        }
        if (target.classList.contains('edit-btn')) {
            const id = target.dataset.id;
            const snapshot = await database.ref(`items/${id}`).once('value');
            const item = snapshot.val();
            clearForm();
            DOM.formTitle.textContent = "✏️ Edit Item";
            document.getElementById('item-id').value = id;
            document.getElementById('item-title').value = item.title;
            document.getElementById('item-description').value = item.description;
            document.getElementById('item-logoUrl').value = item.logoUrl;
            document.getElementById('item-publisherName').value = item.publisherName;
            document.getElementById('item-publisherEmail').value = item.publisherEmail || '';
            document.getElementById('item-screenshots').value = (item.screenshots || []).join(', ');
            document.getElementById('item-type').value = item.type;
            document.getElementById('item-submissionType').value = item.submissionType;
            document.getElementById('item-version').value = item.version || '1.0.0';
            document.getElementById('item-sizeMB').value = item.sizeMB || '';
            document.getElementById('item-sizeUnit').value = item.sizeUnit || 'MB';
            document.getElementById('item-embedCode').value = item.embedCode || '';
            document.getElementById('item-downloadLink').value = item.downloadLink || '';
            DOM.submissionTypeSelect.dispatchEvent(new Event('change'));
            // Scroll to form instead of top
            document.getElementById('item-form-container').scrollIntoView({ behavior: 'smooth' });
        }
        if (target.classList.contains('delete-btn')) {
            const id = target.dataset.id;
            if (confirm('⚠️ Are you sure you want to permanently delete this item AND all its reviews?')) {
                const snapshot = await database.ref(`items/${id}`).once('value');
                const item = snapshot.val();
                database.ref(`items/${id}`).remove();
                database.ref(`reviews/${id}`).remove();
                if (item && item.publisherEmail) {
                    sendNotification(item.publisherEmail, item.title, 'deleted', `Your item "${item.title}" has been removed from the store.`);
                }
                alert('🗑 Item deleted.');
            }
        }
    });

    document.body.addEventListener('change', (e) => {
        if (e.target.classList.contains('featured-toggle')) {
            const id = e.target.dataset.id;
            const isFeatured = e.target.checked;
            database.ref(`items/${id}`).update({ isFeatured: isFeatured });
        }
    });

    function sendNotification(email, title, status, message) {
        if (!email) return;
        const sanitized = sanitizeEmail(email);
        const notification = {
            title,
            status,
            message,
            seen: false,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        database.ref(`notifications/${sanitized}`).push(notification);
    }
    </script>
</body>
</html>
