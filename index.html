<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Store - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary-bg: #121212;
      --secondary-bg: #1E1E1E;
      --card-bg: #2A2A2A;
      --primary-text: #E0E0E0;
      --secondary-text: #B3B3B3;
      --accent-color: #007BFF;
      --success-color: #28a745;
      --error-color: #dc3545;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--primary-bg);
      color: var(--primary-text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .admin-section {
      background-color: var(--secondary-bg);
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    h2 {
      font-weight: 400;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--secondary-text);
      font-size: 0.9em;
    }

    input, select {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid #444;
      background-color: var(--card-bg);
      color: var(--primary-text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s ease;
    }

    input:focus, select:focus {
      border-color: var(--accent-color);
    }

    button {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      color: #fff;
      background-color: var(--accent-color);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    #status-message {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      font-weight: 600;
      display: none;
    }
    .status-success { background-color: var(--success-color); color: white; }
    .status-error { background-color: var(--error-color); color: white; }

    #category-list, #app-list {
      list-style: none;
      padding: 0;
    }

    #category-list li, #app-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--error-color);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 5px;
    }

    .delete-app-btn {
      font-size: 0.9rem;
      color: #fff;
      background-color: var(--error-color);
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>App Store Admin Panel</h1>

  <!-- Section: Add App -->
  <section class="admin-section">
    <h2>Add New App</h2>
    <form id="add-app-form">
      <div class="form-group">
        <label for="appName">App Name</label>
        <input type="text" id="appName" required>
      </div>
      <div class="form-group">
        <label for="appLogo">App Logo URL</label>
        <input type="url" id="appLogo" required>
      </div>
      <div class="form-group">
        <label for="appVersion">App Version</label>
        <input type="text" id="appVersion" required>
      </div>
      <div class="form-group">
        <label for="appLink">App Download Link</label>
        <input type="url" id="appLink" required>
      </div>
      <div class="form-group">
        <label for="appCategory">App Category</label>
        <select id="appCategory" required>
          <option value="" disabled selected>Loading categories...</option>
        </select>
      </div>
      <button type="submit">Publish App</button>
      <p id="app-status-message"></p>
    </form>
  </section>

  <!-- Section: Manage Categories -->
  <section class="admin-section">
    <h2>Manage Categories</h2>
    <form id="add-category-form">
      <div class="form-group">
        <label for="newCategoryName">New Category Name</label>
        <input type="text" id="newCategoryName" required>
      </div>
      <button type="submit">Add Category</button>
    </form>

    <h3 style="margin-top: 30px; margin-bottom: 15px; font-weight: 400;">Existing Categories</h3>
    <ul id="category-list"><li>Loading...</li></ul>
    <p id="category-status-message"></p>
  </section>

  <!-- Section: Manage Apps -->
  <section class="admin-section">
    <h2>Manage Apps</h2>
    <div class="form-group">
      <label for="searchApp">Search App</label>
      <input type="text" id="searchApp" placeholder="Type app name to search...">
    </div>
    <ul id="app-list"><li>Loading apps...</li></ul>
    <p id="app-delete-status-message"></p>
  </section>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDV1m3PiT5gvhR0-D40JfAy9WR6o2Ox7hM",
    authDomain: "vip-e-sports-ff9fd.firebaseapp.com",
    databaseURL: "https://vip-e-sports-ff9fd-default-rtdb.firebaseio.com",
    projectId: "vip-e-sports-ff9fd",
    storageBucket: "vip-e-sports-ff9fd.appspot.com",
    messagingSenderId: "222104072908",
    appId: "1:222104072908:web:b7f275cb7f1dd931d0c869"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const addAppForm = document.getElementById('add-app-form');
  const addCategoryForm = document.getElementById('add-category-form');
  const appCategorySelect = document.getElementById('appCategory');
  const categoryList = document.getElementById('category-list');
  const appList = document.getElementById('app-list');
  const appStatusMessage = document.getElementById('app-status-message');
  const categoryStatusMessage = document.getElementById('category-status-message');
  const appDeleteStatusMessage = document.getElementById('app-delete-status-message');
  const searchInput = document.getElementById('searchApp');

  const showStatus = (element, message, isSuccess) => {
    element.textContent = message;
    element.className = isSuccess ? 'status-success' : 'status-error';
    element.style.display = 'block';
    setTimeout(() => {
      element.style.display = 'none';
    }, 3000);
  };

  // Fetch Categories
  db.collection('categories').orderBy('name').onSnapshot(snapshot => {
    appCategorySelect.innerHTML = '<option value="" disabled selected>Select a category</option>';
    categoryList.innerHTML = '';

    if (snapshot.empty) {
      categoryList.innerHTML = '<li>No categories found. Add one above!</li>';
    }

    snapshot.forEach(doc => {
      const category = doc.data();
      const categoryId = doc.id;

      const option = document.createElement('option');
      option.value = category.name;
      option.textContent = category.name;
      appCategorySelect.appendChild(option);

      const li = document.createElement('li');
      li.textContent = category.name;

      const deleteButton = document.createElement('button');
      deleteButton.textContent = '✖';
      deleteButton.className = 'delete-btn';
      deleteButton.dataset.id = categoryId;

      li.appendChild(deleteButton);
      categoryList.appendChild(li);
    });
  });

  // Add Category
  addCategoryForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const newCategoryName = document.getElementById('newCategoryName').value.trim();
    if (newCategoryName) {
      db.collection('categories').add({ name: newCategoryName })
        .then(() => {
          showStatus(categoryStatusMessage, 'Category added successfully!', true);
          addCategoryForm.reset();
        })
        .catch(error => {
          showStatus(categoryStatusMessage, `Error: ${error.message}`, false);
        });
    }
  });

  // Delete Category
  categoryList.addEventListener('click', (e) => {
    if (e.target.classList.contains('delete-btn')) {
      const categoryId = e.target.dataset.id;
      if (confirm('Are you sure you want to delete this category?')) {
        db.collection('categories').doc(categoryId).delete()
          .then(() => {
            showStatus(categoryStatusMessage, 'Category deleted!', true);
          })
          .catch(error => {
            showStatus(categoryStatusMessage, `Error: ${error.message}`, false);
          });
      }
    }
  });

  // Add App
  addAppForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const newApp = {
      name: document.getElementById('appName').value,
      logoUrl: document.getElementById('appLogo').value,
      version: document.getElementById('appVersion').value,
      downloadLink: document.getElementById('appLink').value,
      category: document.getElementById('appCategory').value,
    };

    db.collection('apps').add(newApp)
      .then(() => {
        showStatus(appStatusMessage, 'App published successfully!', true);
        addAppForm.reset();
        appCategorySelect.selectedIndex = 0;
      })
      .catch(error => {
        showStatus(appStatusMessage, `Error: ${error.message}`, false);
      });
  });

  // Manage and Search Apps
  let allApps = [];

  db.collection('apps').orderBy('name').onSnapshot(snapshot => {
    allApps = [];
    if (snapshot.empty) {
      appList.innerHTML = '<li>No apps found.</li>';
      return;
    }

    snapshot.forEach(doc => {
      const app = doc.data();
      app.id = doc.id;
      allApps.push(app);
    });

    renderApps(allApps);
  });

  function renderApps(apps) {
    appList.innerHTML = '';
    if (apps.length === 0) {
      appList.innerHTML = '<li>No apps matched your search.</li>';
      return;
    }

    apps.forEach(app => {
      const li = document.createElement('li');
      li.innerHTML = `
        <div>
          <strong>${app.name}</strong><br>
          <small style="color: var(--secondary-text);">${app.category} - v${app.version}</small>
        </div>
      `;

      const deleteButton = document.createElement('button');
      deleteButton.textContent = 'Delete';
      deleteButton.className = 'delete-app-btn';
      deleteButton.addEventListener('click', () => {
        if (confirm(`Delete app "${app.name}"?`)) {
          db.collection('apps').doc(app.id).delete()
            .then(() => showStatus(appDeleteStatusMessage, 'App deleted successfully!', true))
            .catch(err => showStatus(appDeleteStatusMessage, `Error: ${err.message}`, false));
        }
      });

      li.appendChild(deleteButton);
      appList.appendChild(li);
    });
  }

  searchInput.addEventListener('input', () => {
    const query = searchInput.value.toLowerCase();
    const filteredApps = allApps.filter(app => app.name.toLowerCase().includes(query));
    renderApps(filteredApps);
  });
function renderApps(apps) {
  appList.innerHTML = '';
  if (apps.length === 0) {
    appList.innerHTML = '<li>No apps matched your search.</li>';
    return;
  }

  apps.forEach(app => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div>
        <strong>${app.name}</strong><br>
        <small style="color: var(--secondary-text);">${app.category} - v${app.version}</small>
      </div>
    `;

    // Edit Button
    const editButton = document.createElement('button');
    editButton.textContent = 'Edit';
    editButton.className = 'delete-app-btn';
    editButton.style.backgroundColor = '#ffc107'; // yellow style for edit
    editButton.style.marginRight = '8px';

    editButton.addEventListener('click', () => {
      // Show a prompt-based edit form (simple version)
      const newName = prompt("Edit App Name:", app.name);
      const newLogo = prompt("Edit App Logo URL:", app.logoUrl);
      const newVersion = prompt("Edit App Version:", app.version);
      const newLink = prompt("Edit App Download Link:", app.downloadLink);
      const newCategory = prompt("Edit App Category:", app.category);

      if (newName && newLogo && newVersion && newLink && newCategory) {
        db.collection('apps').doc(app.id).update({
          name: newName,
          logoUrl: newLogo,
          version: newVersion,
          downloadLink: newLink,
          category: newCategory
        })
        .then(() => {
          showStatus(appDeleteStatusMessage, 'App updated successfully!', true);
        })
        .catch(err => {
          showStatus(appDeleteStatusMessage, `Error: ${err.message}`, false);
        });
      }
    });

    // Delete Button
    const deleteButton = document.createElement('button');
    deleteButton.textContent = 'Delete';
    deleteButton.className = 'delete-app-btn';
    deleteButton.addEventListener('click', () => {
      if (confirm(`Delete app "${app.name}"?`)) {
        db.collection('apps').doc(app.id).delete()
          .then(() => showStatus(appDeleteStatusMessage, 'App deleted successfully!', true))
          .catch(err => showStatus(appDeleteStatusMessage, `Error: ${err.message}`, false));
      }
    });

    li.appendChild(editButton);
    li.appendChild(deleteButton);
    appList.appendChild(li);
  });
}
</script>
</body>
</html>
